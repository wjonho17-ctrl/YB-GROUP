<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rwanda Pharmacy System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">

    <!-- TOP NAVIGATION -->
    <nav class="bg-white border-b sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl"> </span>
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-emerald-600">
                    Rwanda Pharmacy
                </h1>
            </div>
            <div class="text-xs font-medium text-slate-400 uppercase tracking-widest">Digital Health Portal</div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- LEFT COLUMN: SEARCH & RESULTS -->
        <div class="lg:col-span-2 space-y-6">
            
            <!-- SEARCH BOX -->
            <div class="bg-white p-2 rounded-2xl shadow-sm border border-slate-200 flex items-center">
                <input id="search" type="text" 
                    placeholder="Search medicine name or code (e.g., 4456)..."
                    class="flex-1 p-4 outline-none text-slate-700 bg-transparent"
                    onkeyup="if(event.key === 'Enter') searchAll()">
                <button onclick="searchAll()"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl transition-all font-semibold shadow-md shadow-blue-100">
                    Search
                </button>
            </div>

            <!-- RESULTS AREA -->
            <div id="result-container" class="space-y-4">
                <div id="empty-state" class="py-20 text-center">
                    <div class="text-5xl mb-4">🔍</div>
                    <p class="text-slate-400">Search for medication to see available pharmacies</p>
                </div>
                <div id="result" class="grid grid-cols-1 gap-4"></div>
            </div>
        </div>

        <!-- RIGHT COLUMN: CART -->
        <div class="lg:col-span-1">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 sticky top-24 overflow-hidden">
                <div class="p-5 border-b bg-slate-50/50 flex justify-between items-center">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2">
                        <span>🛒</span> Your Selection
                    </h3>
                    <span id="cart-count" class="bg-blue-100 text-blue-600 text-xs font-bold px-2 py-1 rounded-full">0</span>
                </div>
                
                <div class="p-5">
                    <ul id="cart" class="space-y-3 max-h-[400px] overflow-y-auto mb-4">
                        <p class="text-sm text-slate-400 text-center py-4 italic">No items added yet</p>
                    </ul>
                    
                    <div class="pt-4 border-t border-dashed">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-slate-500 font-medium">Estimated Total</span>
                            <span class="text-xl font-bold text-slate-900"><span id="total">0</span> <small class="text-xs">RWF</small></span>
                        </div>
                        <button class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-emerald-100">
                            Proceed to Pharmacy
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </main>

<script>
const pharmacies = [
    {
        name: "UNIKA PHARMACY",
        address: "Kigali - Nyabugogo",
        phone: "0784040780",
        stock: [
            {name:"Amoxicillin 500mg", price:2000},
            {name:"Ibuprofen 400mg", price:3000}
        ]
    },
    {
        name: "LEGERO PHARMACY",
        address: "Kigali - Karama",
        phone: "0784074997",
        stock: [
            {name:"Ibuprofen 400mg", price:3200}
        ]
    },
    {
        name: "SILOAM PHARMACY",
        address: "Kigali - Nyamirambo",
        phone: "0784040786",
        stock: [
            {name:"Amoxicillin 500mg", price:2100}
        ]
    }
];

const codes = { "4456": ["Amoxicillin 500mg", "Ibuprofen 400mg"] };
let cart = [];

function searchAll(){
    const input = document.getElementById("search").value.toLowerCase();
    const resultDiv = document.getElementById("result");
    const emptyState = document.getElementById("empty-state");

    if(!input) return;

    resultDiv.innerHTML = "";
    emptyState.classList.add("hidden");
    let found = false;

    // Helper to render card
    const createCard = (med, pharmacy) => {
        return `
        <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow flex justify-between items-center group">
            <div class="flex-1">
                <div class="flex items-center gap-2 mb-1">
                    <h4 class="font-bold text-slate-800 text-lg">${med.name}</h4>
                    <span class="text-xs bg-blue-50 text-blue-600 px-2 py-0.5 rounded font-medium">In Stock</span>
                </div>
                <p class="text-blue-600 font-bold text-md mb-2">${med.price.toLocaleString()} RWF</p>
                <div class="flex items-center gap-3 text-slate-500 text-sm">
                    <span class="flex items-center gap-1">📍 ${pharmacy.name}</span>
                    <span class="text-slate-300">|</span>
                    <span class="flex items-center gap-1">📞 ${pharmacy.phone}</span>
                </div>
            </div>
            <button onclick="addToCart('${med.name}', ${med.price})"
                class="bg-slate-900 group-hover:bg-blue-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold transition-colors">
                Add to Cart
            </button>
        </div>`;
    };

    // SEARCH LOGIC
    if(codes[input]){
        codes[input].forEach(medName => {
            pharmacies.forEach(p => {
                p.stock.forEach(item => {
                    if(item.name === medName) {
                        found = true;
                        resultDiv.innerHTML += createCard(item, p);
                    }
                });
            });
        });
    } else {
        pharmacies.forEach(p => {
            p.stock.forEach(item => {
                if(item.name.toLowerCase().includes(input)){
                    found = true;
                    resultDiv.innerHTML += createCard(item, p);
                }
            });
        });
    }

    if(!found){
        resultDiv.innerHTML = `<div class="p-10 text-center text-red-400 bg-red-50 rounded-2xl border border-red-100">❌ No results found for "${input}"</div>`;
    }
}

function addToCart(name, price){
    cart.push({name, price});
    updateCart();
}

function updateCart(){
    const cartEl = document.getElementById("cart");
    const totalEl = document.getElementById("total");
    const countEl = document.getElementById("cart-count");

    if(cart.length === 0) {
        cartEl.innerHTML = `<p class="text-sm text-slate-400 text-center py-4 italic">No items added yet</p>`;
    } else {
        cartEl.innerHTML = cart.map((item, index) => `
            <li class="flex justify-between items-center text-sm bg-slate-50 p-3 rounded-lg border border-slate-100">
                <span class="font-medium text-slate-700">${item.name}</span>
                <div class="flex items-center gap-3">
                    <span class="font-bold text-slate-900">${item.price.toLocaleString()}</span>
                    <button onclick="removeFromCart(${index})" class="text-red-400 hover:text-red-600">✕</button>
                </div>
            </li>
        `).join('');
    }

    const total = cart.reduce((sum, item) => sum + item.price, 0);
    totalEl.innerText = total.toLocaleString();
    countEl.innerText = cart.length;
}

function removeFromCart(index) {
    cart.splice(index, 1);
    updateCart();
}
</script>

</body>
</html>
